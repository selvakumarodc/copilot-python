#run pthon tests based on pull request using gihub actions
name: Python CI 
#Trigger for push or pull request happens on main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]    
jobs:
  build:    
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest test_app.py